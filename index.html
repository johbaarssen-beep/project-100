<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#101418" />
  <title>Project 100</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#0f1418; --card:#182026; --card2:#202a31; --text:#f3f6f7;
      --muted:#9eb0ba; --accent:#7bdc65; --line:#2d3941; --warn:#ffcc66;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:760px;margin:auto;padding:18px 16px 96px}
    h1{margin:8px 0 2px;font-size:28px}
    .sub{color:var(--muted);margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}
    .wide{grid-column:1/-1}
    .label{color:var(--muted);font-size:13px}
    .big{font-size:29px;font-weight:700;margin-top:4px}
    .accent{color:var(--accent)}
    .progress{height:14px;background:#263139;border-radius:99px;overflow:hidden;margin:12px 0 6px}
    .bar{height:100%;background:var(--accent);width:0%}
    input,select,textarea,button{
      width:100%;border-radius:12px;border:1px solid var(--line);
      background:var(--card2);color:var(--text);padding:12px;font-size:16px
    }
    textarea{min-height:82px;resize:vertical}
    button{background:var(--accent);color:#0d160b;border:none;font-weight:700}
    button.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}
    .checks{display:grid;gap:10px;margin-top:10px}
    .checkrow{display:flex;align-items:center;gap:10px;background:var(--card2);padding:12px;border-radius:12px}
    .checkrow input{width:22px;height:22px}
    .history{display:grid;gap:8px;margin-top:10px}
    .row{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:8px;padding:10px;border-bottom:1px solid var(--line)}
    .tabs{position:fixed;left:0;right:0;bottom:0;background:#11181d;border-top:1px solid var(--line);display:flex;justify-content:center}
    .tabs button{max-width:250px;border-radius:0;background:transparent;color:var(--muted);padding:15px}
    .tabs button.active{color:var(--accent)}
    section{display:none}.show{display:block}
    .tiny{font-size:12px;color:var(--muted)}
    @media(max-width:520px){.grid{grid-template-columns:1fr 1fr}.big{font-size:24px}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>PROJECT 100</h1>
  <div class="sub">Niet perfect. Wel consequent.</div>

  <section id="dashboard" class="show">
    <div class="grid">
      <div class="card">
        <div class="label">Huidig gewicht</div>
        <div class="big" id="currentWeight">106,9 kg</div>
      </div>
      <div class="card">
        <div class="label">Buikomvang</div>
        <div class="big" id="currentWaist">116 cm</div>
      </div>
      <div class="card wide">
        <div class="label">Voortgang naar 99,9 kg</div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <div class="tiny" id="progressText"></div>
      </div>
      <div class="card">
        <div class="label">Deze week actief</div>
        <div class="big accent" id="activeDays">0 dagen</div>
      </div>
      <div class="card">
        <div class="label">Weekscore</div>
        <div class="big accent" id="weekScore">0%</div>
      </div>
      <div class="card wide">
        <div class="label">Laatste metingen</div>
        <div class="history" id="history"></div>
      </div>
    </div>
  </section>

  <section id="today">
    <div class="card">
      <div class="label">Datum</div>
      <input id="date" type="date" />
      <br><br>
      <div class="grid">
        <div>
          <div class="label">Gewicht (kg)</div>
          <input id="weight" inputmode="decimal" placeholder="106,9" />
        </div>
        <div>
          <div class="label">Buikomvang (cm)</div>
          <input id="waist" inputmode="decimal" placeholder="116" />
        </div>
      </div>
      <div class="checks">
        <label class="checkrow"><input type="checkbox" id="breakfast"> Ontbijt volgens plan</label>
        <label class="checkrow"><input type="checkbox" id="onePlate"> Eén bord avondeten</label>
        <label class="checkrow"><input type="checkbox" id="noSnacking"> Niet gesnoept</label>
        <label class="checkrow"><input type="checkbox" id="water"> Genoeg gedronken</label>
        <label class="checkrow"><input type="checkbox" id="movement"> Bewogen</label>
      </div>
      <br>
      <div class="label">Activiteit</div>
      <select id="activity">
        <option value="">Geen</option>
        <option>Wandelen</option>
        <option>Mountainbiken</option>
        <option>Zwemmen</option>
        <option>Fietsen</option>
      </select>
      <br><br>
      <div class="label">Notitie</div>
      <textarea id="note" placeholder="Bijvoorbeeld: vrijdag halve kip met kleine patat"></textarea>
      <br>
      <button onclick="saveEntry()">Opslaan</button>
    </div>
  </section>

  <section id="settings">
    <div class="card">
      <div class="label">Startgewicht</div>
      <input id="startWeight" value="106.9" />
      <br><br>
      <div class="label">Doelgewicht</div>
      <input id="goalWeight" value="99.9" />
      <br><br>
      <button onclick="saveSettings()">Instellingen opslaan</button>
      <br><br>
      <button class="secondary" onclick="exportData()">Gegevens exporteren</button>
      <br><br>
      <button class="secondary" onclick="clearData()">Alle gegevens wissen</button>
    </div>
  </section>
</div>

<div class="tabs">
  <button id="tabDash" class="active" onclick="showTab('dashboard',this)">Dashboard</button>
  <button onclick="showTab('today',this)">Vandaag</button>
  <button onclick="showTab('settings',this)">Instellingen</button>
</div>

<script>
const $ = id => document.getElementById(id);
let entries = JSON.parse(localStorage.getItem('p100_entries') || '[]');
let settings = JSON.parse(localStorage.getItem('p100_settings') || '{"startWeight":106.9,"goalWeight":99.9}');

function parseNum(v){ return Number(String(v).replace(',','.')); }
function fmt(v, d=1){ return Number(v).toFixed(d).replace('.',','); }

function showTab(id, btn){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('show'));
  $(id).classList.add('show');
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function saveEntry(){
  const date = $('date').value || new Date().toISOString().slice(0,10);
  const entry = {
    date,
    weight: parseNum($('weight').value),
    waist: parseNum($('waist').value),
    breakfast:$('breakfast').checked,
    onePlate:$('onePlate').checked,
    noSnacking:$('noSnacking').checked,
    water:$('water').checked,
    movement:$('movement').checked,
    activity:$('activity').value,
    note:$('note').value.trim()
  };
  entries = entries.filter(e=>e.date!==date);
  entries.push(entry);
  entries.sort((a,b)=>a.date.localeCompare(b.date));
  localStorage.setItem('p100_entries', JSON.stringify(entries));
  render();
  alert('Opgeslagen 👊');
}

function saveSettings(){
  settings = {startWeight:parseNum($('startWeight').value),goalWeight:parseNum($('goalWeight').value)};
  localStorage.setItem('p100_settings', JSON.stringify(settings));
  render();
}

function render(){
  $('startWeight').value=settings.startWeight;
  $('goalWeight').value=settings.goalWeight;
  const measured = entries.filter(e=>!Number.isNaN(e.weight));
  const last = measured[measured.length-1] || {weight:settings.startWeight, waist:116};
  $('currentWeight').textContent = fmt(last.weight)+' kg';
  $('currentWaist').textContent = (Number.isNaN(last.waist)?'—':fmt(last.waist,0)+' cm');
  const total = settings.startWeight-settings.goalWeight;
  const done = settings.startWeight-last.weight;
  const pct = Math.max(0,Math.min(100,(done/total)*100));
  $('progressBar').style.width=pct+'%';
  $('progressText').textContent = fmt(Math.max(0,done))+' kg van '+fmt(total)+' kg bereikt';

  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-6);
  const recent = entries.filter(e=>new Date(e.date)>=weekAgo && new Date(e.date)<=now);
  $('activeDays').textContent = recent.filter(e=>e.movement||e.activity).length+' dagen';
  const checks = recent.flatMap(e=>[e.breakfast,e.onePlate,e.noSnacking,e.water,e.movement]);
  const score = checks.length ? Math.round(checks.filter(Boolean).length/checks.length*100) : 0;
  $('weekScore').textContent=score+'%';

  $('history').innerHTML = measured.slice(-7).reverse().map(e=>
    `<div class="row"><span>${e.date}</span><strong>${fmt(e.weight)} kg</strong><span>${Number.isNaN(e.waist)?'':fmt(e.waist,0)+' cm'}</span></div>`
  ).join('') || '<div class="tiny">Nog geen metingen opgeslagen.</div>';
}

function exportData(){
  const blob = new Blob([JSON.stringify({settings,entries},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='project100-backup.json'; a.click();
}

function clearData(){
  if(confirm('Weet je zeker dat je alle gegevens wilt wissen?')){
    entries=[]; localStorage.removeItem('p100_entries'); render();
  }
}

$('date').value = new Date().toISOString().slice(0,10);
render();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('service-worker.js'); }
</script>
</body>
</html>
