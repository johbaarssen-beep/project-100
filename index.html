<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f1418" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Project 100" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Project 100</title>
  <style>
    :root{
      --bg:#0d1216;--card:#172027;--card2:#202a31;--text:#f3f7f8;
      --muted:#9fb0b9;--accent:#7ee36a;--line:#2e3a42;--danger:#ff7777;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{margin:0;background:linear-gradient(180deg,#0b1014,#11181d);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:780px;margin:auto;padding:18px 16px 104px}
    .brand{display:flex;align-items:center;gap:12px;margin:5px 0 18px}
    .brand img{width:52px;height:52px;border-radius:14px}
    h1{font-size:27px;margin:0}.tag{color:var(--muted);margin-top:3px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card{background:rgba(23,32,39,.96);border:1px solid var(--line);border-radius:19px;padding:16px;
      box-shadow:0 10px 28px rgba(0,0,0,.18)}
    .wide{grid-column:1/-1}.label{font-size:13px;color:var(--muted)}
    .big{font-size:28px;font-weight:760;margin-top:5px}.accent{color:var(--accent)}
    .progress{height:14px;background:#28343b;border-radius:99px;overflow:hidden;margin:12px 0 7px}
    .bar{height:100%;background:linear-gradient(90deg,#64c858,#8bf278);width:0%;transition:width .4s}
    .tiny{font-size:12px;color:var(--muted)}
    input,select,textarea,button{
      width:100%;border-radius:13px;border:1px solid var(--line);background:var(--card2);
      color:var(--text);padding:12px;font-size:16px
    }
    textarea{min-height:80px;resize:vertical}button{border:none;background:var(--accent);color:#0b1609;font-weight:750}
    button.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}
    button.danger{background:transparent;color:var(--danger);border:1px solid #693c3c}
    .checks{display:grid;gap:9px;margin-top:10px}
    .checkrow{display:flex;align-items:center;gap:11px;background:var(--card2);padding:12px;border-radius:12px}
    .checkrow input{width:22px;height:22px;accent-color:var(--accent)}
    section{display:none}.show{display:block}
    .history{display:grid;gap:3px;margin-top:8px}
    .row{display:grid;grid-template-columns:1.2fr .9fr .9fr;gap:8px;padding:10px 2px;border-bottom:1px solid var(--line)}
    canvas{width:100%;height:210px;background:#11181d;border-radius:13px;margin-top:10px}
    .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;
      background:rgba(12,18,22,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);
      padding-bottom:env(safe-area-inset-bottom)}
    .tabs button{max-width:220px;border-radius:0;background:transparent;color:var(--muted);padding:15px 8px}
    .tabs button.active{color:var(--accent)}
    .success{display:none;margin-top:12px;padding:11px;border-radius:12px;background:#18351b;color:#a9f59d}
    @media(max-width:520px){.big{font-size:24px}.brand img{width:46px;height:46px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="icon-192.png" alt="">
    <div><h1>PROJECT 100</h1><div class="tag">Niet perfect. Wel consequent.</div></div>
  </div>

  <section id="dashboard" class="show">
    <div class="grid">
      <div class="card"><div class="label">Huidig gewicht</div><div class="big" id="currentWeight">106,9 kg</div></div>
      <div class="card"><div class="label">Buikomvang</div><div class="big" id="currentWaist">116 cm</div></div>
      <div class="card wide">
        <div class="label">Voortgang naar 99,9 kg</div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <div class="tiny" id="progressText"></div>
      </div>
      <div class="card"><div class="label">Actieve dagen (7 dgn)</div><div class="big accent" id="activeDays">0</div></div>
      <div class="card"><div class="label">Weekscore</div><div class="big accent" id="weekScore">0%</div></div>
      <div class="card wide">
        <div class="label">Gewichtstrend</div>
        <canvas id="chart" width="680" height="210"></canvas>
      </div>
      <div class="card wide">
        <div class="label">Laatste metingen</div>
        <div class="history" id="history"></div>
      </div>
    </div>
  </section>

  <section id="today">
    <div class="card">
      <div class="label">Datum</div><input id="date" type="date" />
      <br><br>
      <div class="grid">
        <div><div class="label">Gewicht (kg)</div><input id="weight" inputmode="decimal" placeholder="bijv. 107,1" /></div>
        <div><div class="label">Buikomvang (cm)</div><input id="waist" inputmode="decimal" placeholder="bijv. 116" /></div>
      </div>
      <div class="checks">
        <label class="checkrow"><input type="checkbox" id="breakfast"> Ontbijt volgens plan</label>
        <label class="checkrow"><input type="checkbox" id="onePlate"> Eén bord avondeten</label>
        <label class="checkrow"><input type="checkbox" id="noSnacking"> Niet gesnoept</label>
        <label class="checkrow"><input type="checkbox" id="water"> Genoeg gedronken</label>
        <label class="checkrow"><input type="checkbox" id="movement"> Bewogen</label>
      </div>
      <br>
      <div class="label">Activiteit</div>
      <select id="activity">
        <option value="">Geen</option><option>Wandelen</option><option>Mountainbiken</option>
        <option>Zwemmen</option><option>Fietsen</option>
      </select>
      <br><br>
      <div class="label">Notitie</div>
      <textarea id="note" placeholder="Bijvoorbeeld: geen tweede bord genomen"></textarea>
      <br>
      <button onclick="saveEntry()">Meting opslaan</button>
      <div class="success" id="saved">Opgeslagen 👊</div>
    </div>
  </section>

  <section id="settings">
    <div class="card">
      <div class="label">Startgewicht</div><input id="startWeight" value="106.9" />
      <br><br><div class="label">Doelgewicht</div><input id="goalWeight" value="99.9" />
      <br><br><button onclick="saveSettings()">Instellingen opslaan</button>
      <br><br><button class="secondary" onclick="exportData()">Back-up exporteren</button>
      <br><br><button class="danger" onclick="clearData()">Alle ingevoerde gegevens wissen</button>
    </div>
  </section>
</div>

<div class="tabs">
  <button class="active" onclick="showTab('dashboard',this)">Dashboard</button>
  <button onclick="showTab('today',this)">Vandaag</button>
  <button onclick="showTab('settings',this)">Instellingen</button>
</div>

<script>
const $=id=>document.getElementById(id);
const KEY_E='p100_entries', KEY_S='p100_settings';
let entries=JSON.parse(localStorage.getItem(KEY_E)||'[]');
let settings=JSON.parse(localStorage.getItem(KEY_S)||'{"startWeight":106.9,"goalWeight":99.9}');

function num(v){const n=Number(String(v).replace(',','.'));return Number.isFinite(n)?n:null}
function fmt(v,d=1){return Number(v).toFixed(d).replace('.',',')}
function showTab(id,btn){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('show'));$(id).classList.add('show');
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
}
function saveEntry(){
  const date=$('date').value||new Date().toISOString().slice(0,10);
  const existing=entries.find(e=>e.date===date)||{};
  const e={...existing,date,weight:num($('weight').value),waist:num($('waist').value),
    breakfast:$('breakfast').checked,onePlate:$('onePlate').checked,noSnacking:$('noSnacking').checked,
    water:$('water').checked,movement:$('movement').checked,activity:$('activity').value,note:$('note').value.trim()};
  entries=entries.filter(x=>x.date!==date);entries.push(e);entries.sort((a,b)=>a.date.localeCompare(b.date));
  localStorage.setItem(KEY_E,JSON.stringify(entries));render();
  $('saved').style.display='block';setTimeout(()=>$('saved').style.display='none',1800);
}
function saveSettings(){
  settings={startWeight:num($('startWeight').value)||106.9,goalWeight:num($('goalWeight').value)||99.9};
  localStorage.setItem(KEY_S,JSON.stringify(settings));render();
}
function render(){
  $('startWeight').value=settings.startWeight;$('goalWeight').value=settings.goalWeight;
  const measured=entries.filter(e=>e.weight!==null&&e.weight!==undefined);
  const last=measured[measured.length-1]||{weight:settings.startWeight,waist:116};
  $('currentWeight').textContent=fmt(last.weight)+' kg';
  $('currentWaist').textContent=(last.waist==null?'—':fmt(last.waist,0)+' cm');
  const total=settings.startWeight-settings.goalWeight, done=settings.startWeight-last.weight;
  const pct=total>0?Math.max(0,Math.min(100,done/total*100)):0;
  $('progressBar').style.width=pct+'%';
  $('progressText').textContent=fmt(Math.max(0,done))+' kg van '+fmt(total)+' kg bereikt';
  const now=new Date(), weekAgo=new Date();weekAgo.setDate(now.getDate()-6);
  const recent=entries.filter(e=>new Date(e.date)>=weekAgo&&new Date(e.date)<=now);
  $('activeDays').textContent=recent.filter(e=>e.movement||e.activity).length+' dagen';
  const checks=recent.flatMap(e=>[e.breakfast,e.onePlate,e.noSnacking,e.water,e.movement]);
  $('weekScore').textContent=(checks.length?Math.round(checks.filter(Boolean).length/checks.length*100):0)+'%';
  $('history').innerHTML=measured.slice(-7).reverse().map(e=>
    `<div class="row"><span>${e.date}</span><strong>${fmt(e.weight)} kg</strong><span>${e.waist==null?'':fmt(e.waist,0)+' cm'}</span></div>`
  ).join('')||'<div class="tiny">Nog geen metingen. Tik onderaan op Vandaag.</div>';
  drawChart(measured.slice(-14));
}
function drawChart(data){
  const c=$('chart'),ctx=c.getContext('2d'),W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#11181d';ctx.fillRect(0,0,W,H);
  if(data.length<2){ctx.fillStyle='#9fb0b9';ctx.font='15px sans-serif';ctx.fillText('Na twee metingen verschijnt hier je trend.',20,40);return}
  const vals=data.map(x=>x.weight),min=Math.min(...vals)-.3,max=Math.max(...vals)+.3;
  ctx.strokeStyle='#2e3a42';ctx.lineWidth=1;
  for(let i=1;i<4;i++){let y=20+i*(H-45)/4;ctx.beginPath();ctx.moveTo(15,y);ctx.lineTo(W-15,y);ctx.stroke()}
  ctx.strokeStyle='#7ee36a';ctx.lineWidth=4;ctx.lineJoin='round';ctx.beginPath();
  data.forEach((e,i)=>{const x=20+i*(W-40)/(data.length-1),y=15+(max-e.weight)/(max-min)*(H-45);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();
  data.forEach((e,i)=>{const x=20+i*(W-40)/(data.length-1),y=15+(max-e.weight)/(max-min)*(H-45);
    ctx.fillStyle='#7ee36a';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill()});
}
function exportData(){
  const blob=new Blob([JSON.stringify({settings,entries},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='project100-backup.json';a.click();
}
function clearData(){if(confirm('Alle ingevoerde gegevens wissen?')){entries=[];localStorage.removeItem(KEY_E);render()}}
$('date').value=new Date().toISOString().slice(0,10);render();
if('serviceWorker'in navigator){navigator.serviceWorker.register('service-worker.js')}
</script>
</body>
</html>
